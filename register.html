<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; color: #111; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: url('ICFAIimage.png'); background-size: cover; background-position: center; background-repeat: no-repeat; }
       .container { background: rgba(255, 255, 255, 0.30); backdrop-filter: blur(2px); width: 100%; max-width: 850px; padding: 40px; border-radius: 16px; border: 2px solid #111; box-shadow: 3px 3px 0px #111; }
        h1 { text-align: center; margin-bottom: 10px; color: #093ac4; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 2rem; }
        h3 { margin: 30px 0 15px 0; border-bottom: 2px solid #111; padding-bottom: 5px; color: #fdfafa; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        h3 i { color: #0568be; }
       .form-grid { display: grid; color: #eef1f3; grid-template-columns: repeat(2, 1fr); gap: 20px; }
       .form-group { margin-bottom: 5px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13.5px; }
        input, select { width: 100%; padding: 11px 14px; border: 2px solid #111; border-radius: 8px; font-size: 14px; outline: none; background: white; }
       .btn-container { display: flex; gap: 15px; margin-top: 35px; }
       .btn { flex: 1; padding: 14px; border: 2px solid #111; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
       .btn-submit { background: #0568be; color: white; }
       .btn-back { background: #ffffff; color: #111; }
       .sarcastic-loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 104, 190, 0.98); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
       .spinner-box { width: 65px; height: 65px; border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid #ffffff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sarcastic-message { font-size: 20px; font-weight: 700; }
    </style>
</head>
<body>

<div id="sarcasticLoader" class="sarcastic-loader-overlay">
    <div class="spinner-box"></div>
    <div id="loaderTextPhrase" class="sarcastic-message">Saving...</div>
</div>

<div class="container">
    <h1><i class="fa-solid fa-snowflake"></i> Registration Framework <i class="fa-solid fa-clover"></i></h1>

    <form id="studentForm">
        <h3><i class="fa-solid fa-key"></i> Credentials Identification</h3>
        <div class="form-grid">
            <div class="form-group"><label for="roll">Roll Number*</label><input type="text" id="roll" required></div>
            <div class="form-group"><label for="password">Password*</label><input type="password" id="password" required></div>
        </div>

        <h3><i class="fa-solid fa-user"></i> Personal Identity </h3>
        <div class="form-grid">
            <div class="form-group"><label for="fullName">Full Name*</label><input type="text" id="fullName" required></div>
            <div class="form-group"><label for="fatherName">Father's Name*</label><input type="text" id="fatherName" required></div>
            <div class="form-group"><label for="age">Age *</label><input type="number" id="age" required></div>
            <div class="form-group"><label for="gender">Gender*</label><select id="gender" required><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
            <div class="form-group"><label for="maritalStatus">Marital Status*</label><select id="maritalStatus" required><option>Single</option><option>Married</option></select></div>
            <div class="form-group"><label for="mobile">Mobile*</label><input type="tel" id="mobile" required maxlength="10"></div>
        </div>

        <h3><i class="fa-solid fa-graduation-cap"></i> Academic</h3>
        <div class="form-grid">
            <div class="form-group"><label for="department">Department*</label><select id="department" required><option value="">-- Choose --</option><option value="BBA">BBA</option><option value="BBA_HT">BBA (HT)</option><option value="BCOM">BCOM</option><option value="BCA">BCA</option><option value="BSW">BSW</option><option value="BA">BA</option><option value="MBA">MBA</option><option value="MCOM">MCOM</option><option value="MSW">MSW</option><option value="MA">MA</option><option value="PHD">PHD</option></select></div>
            <div class="form-group"><label for="year">Semester*</label><select id="year" required><option value="">-- Select --</option><option value="year1">1st</option><option value="year2">2nd</option><option value="year3">3rd</option><option value="year4">4th</option><option value="year5">5th</option><option value="year6">6th</option><option value="year7">7th</option><option value="year8">8th</option></select></div>
            <div class="form-group"><label for="cgpa">CGPA*</label><input type="text" id="cgpa" required></div>
        </div>

        <h3><i class="fa-solid fa-file-invoice"></i> Educational Records</h3>
        <div class="form-grid">
            <div class="form-group"><label for="school10">10th School*</label><input type="text" id="school10" required></div>
            <div class="form-group"><label for="pass10">10th Year*</label><select id="pass10" required><option value="">Select</option></select></div>
            <div class="form-group"><label for="school12">12th School*</label><input type="text" id="school12" required></div>
            <div class="form-group"><label for="pass12">12th Year*</label><select id="pass12" required><option value="">Select</option></select></div>
        </div>

        <div class="btn-container">
            <a href="index.html" class="btn btn-back"><i class="fa-solid fa-arrow-left"></i> Exit</a>
            <button type="submit" class="btn btn-submit"><i class="fa-solid fa-check"></i> SAVE</button>
        </div>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const pass10Select = document.getElementById("pass10"); 
    const pass12Select = document.getElementById("pass12");
    for (let year = 1980; year <= 2030; year++) { 
        pass10Select.innerHTML += `<option value="${year}">${year}</option>`; 
        pass12Select.innerHTML += `<option value="${year}">${year}</option>`; 
    }
});

const firebaseConfig = {
  apiKey: "AIzaSyDq3sT7R3QL6oA8NTp7sBkV6uWNESzjmko",
  authDomain: "studentinfo-7b36d.firebaseapp.com",
  databaseURL: "https://studentinfo-7b36d-default-rtdb.firebaseio.com",
  projectId: "studentinfo-7b36d"
};

firebase.initializeApp(firebaseConfig);
firebase.database().ref(".info/connected").on("value", function(snap) {
  if (snap.val() === true) {
    alert("GOOD: Connected to Firebase");
  } else {
    alert("BAD: Not Connected to Firebase. Network is blocking it");
  }
});
const database = firebase.database();

function fireLoader(show) { 
    document.getElementById("sarcasticLoader").style.display = show ? "flex" : "none"; 
}

document.getElementById("studentForm").addEventListener("submit", function(e) {
    e.preventDefault();
    fireLoader(true);

    const studentData = {
        roll: document.getElementById("roll").value.trim(),
        password: document.getElementById("password").value,
        fullName: document.getElementById("fullName").value,
        fatherName: document.getElementById("fatherName").value,
        age: document.getElementById("age").value,
        department: document.getElementById("department").value,
        semester: document.getElementById("year").value,
        cgpa: document.getElementById("cgpa").value,
        gender: document.getElementById("gender").value,
        maritalStatus: document.getElementById("maritalStatus").value,
        mobile: document.getElementById("mobile").value,
        school10: document.getElementById("school10").value,
        pass10: document.getElementById("pass10").value,
        school12: document.getElementById("school12").value,
        pass12: document.getElementById("pass12").value,
        semesterFeePaid: false,
        grades: {} // <-- NEW: empty object for admin to add grades later
    };
    console.log("1. Button clicked");
console.log("2. Roll:", studentData.roll);
console.log("3. Firebase DB Object:", database);

let timeout = setTimeout(() => {
    fireLoader(false);
    alert("TIMEOUT: Firebase never replied in 6 seconds. This means network blocked it.");
}, 6000);

database.ref('students/' + studentData.roll).set(studentData)
.then(() => { 
    clearTimeout(timeout);
    console.log("4. SUCCESS");
    fireLoader(false); 
    alert("SUCCESS!"); 
})
.catch(err => { 
    clearTimeout(timeout);
    console.log("4. ERROR:", err);
    fireLoader(false); 
    alert("ERROR: " + err.message); 
});

    database.ref('students/' + studentData.roll).set(studentData)
    .then(() => { 
        fireLoader(false); 
        alert("Account created successfully!"); 
        document.getElementById("studentForm").reset(); // reset instead of redirect
    })
    .catch(err => { 
        fireLoader(false); 
        alert("Error: " + err.message); 
    });
});
</script>
</body>
</html>
